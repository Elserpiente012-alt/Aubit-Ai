<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Monopoly Icon</title>
  <desc id="desc">A red banner with MONO text on a dark circular badge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22292f"/>
      <stop offset="100%" stop-color="#0f151a"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f23f3f"/>
      <stop offset="100%" stop-color="#c81f1f"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="#f7f7f7" stroke-opacity="0.3" stroke-width="6"/>
  <g transform="rotate(-18 128 128)">
    <rect x="38" y="96" width="180" height="64" rx="10" fill="url(#banner)" stroke="#101010" stroke-width="6"/>
    <text x="128" y="139" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle" letter-spacing="2">MONO</text>
  </g>
  <rect x="66" y="44" width="124" height="16" rx="8" fill="#ffffff" fill-opacity="0.16"/>
</svg>
